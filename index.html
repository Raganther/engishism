<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engishism</title>
  <link rel="stylesheet" href="styles/whiteboard.css">
  <style>
    .landing-main {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: clamp(1rem, 3vw, 2rem);
      align-items: center;
      min-height: calc(100vh - 4rem);
      width: min(100%, 1240px);
      margin: 0 auto;
      padding: clamp(1rem, 2.2vw, 2rem);
    }

    .landing-board {
      background: var(--board);
      border: 5px solid var(--line);
      border-radius: 34px;
      padding: clamp(1.4rem, 4vw, 3rem);
      box-shadow: 0 14px 0 var(--shadow);
    }

    .landing-board h1 {
      margin: 0 0 1rem;
      color: var(--orange);
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 950;
      line-height: 0.9;
    }

    .landing-board p {
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(1.15rem, 2vw, 1.55rem);
      font-weight: 800;
      line-height: 1.4;
    }

    .landing-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .landing-actions a {
      display: inline-flex;
      align-items: center;
      min-height: 4rem;
      padding: 0.8rem 1.25rem;
      border: 4px solid var(--orange);
      border-radius: 22px;
      background: var(--orange);
      color: #fff;
      box-shadow: 0 7px 0 rgba(255, 122, 26, 0.28);
      font-size: 1.1rem;
      font-weight: 950;
      text-decoration: none;
    }

    .landing-art {
      min-height: 560px;
      border: 5px solid var(--line);
      border-radius: 34px;
      background:
        linear-gradient(rgba(31, 42, 68, 0.02), rgba(31, 42, 68, 0.02)),
        url("assets/images/units/unit-1-present-continuous/action-sheet.png") center / cover no-repeat;
      box-shadow: 0 14px 0 var(--shadow);
    }

    @media (max-width: 860px) {
      .landing-main {
        grid-template-columns: 1fr;
      }

      .landing-art {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <main class="landing-main">
    <section class="landing-board">
      <p class="eyebrow">Unit-first classroom games</p>
      <h1>Engishism</h1>
      <p>Turn grammar workbook units into illustrated, interactive games for the big screen.</p>
      <div class="landing-actions">
        <a href="app.html">Choose a unit →</a>
      </div>
    </section>
    <aside class="landing-art" aria-label="Present continuous classroom action illustrations"></aside>
  </main>
</body>
</html>
